    async function cargarMenu() {
      const btn = document.getElementById('btn');
      const estado = document.getElementById('estado');
      btn.disabled = true;
      btn.innerText = 'Cargando...';
      estado.innerHTML = '⏳ Conectando con Firebase...';

      try {
        await db.collection('locales').doc('eloeste').update({
          menu: menuCompleto,
          whatsapp: "5491124500967",
          horariosTxt: "🕒 <b>Lun a Jue y Dom:</b> 12:00 a 04:00 AM <br> 🕒 <b>Vie y Sab:</b> 12:00 a 07:00 AM"
        });
        estado.innerHTML = '<span class="ok">✅ Menú cargado correctamente en Firestore.<br>Ya podés eliminar este archivo del repo.</span>';
        btn.innerText = '¡Listo!';
      } catch(e) {
        console.error(e);
        estado.innerHTML = `<span class="err">❌ Error: ${e.message}</span>`;
        btn.disabled = false;
        btn.innerText = 'Reintentar';
      }
    }
