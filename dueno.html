<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Dueño — Dale pué</title>

  <!-- Firebase compat (más simple y confiable) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f4f0;
      --white:   #ffffff;
      --border:  #e2e0d8;
      --text:    #1a1a18;
      --muted:   #7a7870;
      --accent:  #d9232d;
      --yellow:  #ffb800;
      --green:   #1a9e5a;
      --radius:  12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #pantalla-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: #111;
    }

    .login-card {
      background: #1a1a1f;
      border: 1px solid #2e2e36;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .login-logo {
      color: var(--yellow);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .login-sub {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .login-label {
      display: block;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 0.35rem;
      font-weight: 500;
    }

    .login-input {
      width: 100%;
      background: #0f0f11;
      border: 1px solid #2e2e36;
      border-radius: 10px;
      color: #f0eff4;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    .login-input:focus { border-color: var(--yellow); }

    .btn-login {
      width: 100%;
      background: var(--yellow);
      color: #111;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      color: #f76c6c;
      font-size: 0.82rem;
      margin-top: 0.75rem;
      display: none;
      text-align: center;
    }

    .login-error.show { display: block; }

    /* ── PORTAL ── */
    #pantalla-portal { display: none; padding-bottom: 3rem; }

    .topbar {
      background: #111;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand { font-size: 1.1rem; font-weight: 700; color: var(--yellow); }
    .topbar-email { font-size: 0.75rem; color: #888; margin-top: 2px; }

    .btn-salir {
      background: #333;
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

    .section {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--accent); }

    .field textarea { resize: vertical; min-height: 70px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.7rem 1.2rem;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      width: 100%;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }

    .tab {
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active { background: #111; color: #fff; border-color: #111; }

    /* ── PRODUCTOS ── */
    .producto-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .producto-info { flex: 1; min-width: 0; }
    .producto-nombre { font-weight: 600; font-size: 0.9rem; }
    .producto-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .producto-precio { font-weight: 600; color: var(--green); font-size: 0.95rem; white-space: nowrap; }

    .btn-editar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-editar:hover { background: #fef9c3; border-color: #fde047; }

    .form-edicion {
      display: none;
      background: #f0fdf4;
      border: 1px dashed var(--green);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 0.5rem;
    }
    .form-edicion.visible { display: block; }
    .form-edicion-title { font-size: 0.82rem; font-weight: 600; color: var(--green); margin-bottom: 0.75rem; }

    .btn-eliminar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-eliminar:hover { background: #fee2e2; border-color: #fecaca; }

    /* ── FORM NUEVO PRODUCTO ── */
    .form-producto {
      background: #fffbf0;
      border: 1px dashed var(--yellow);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-top: 1rem;
      display: none;
    }

    .form-producto.visible { display: block; }

    .form-producto-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #b38000;
      margin-bottom: 1rem;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #111;
      color: #fff;
      padding: 0.75rem 1.4rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--green); }
    .toast.err { background: var(--accent); }

    .empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .badge-ok  { background: #dcfce7; color: #166534; }
    .badge-off { background: #fee2e2; color: #991b1b; }

    @media (max-width: 480px) {
      .row-2, .row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="pantalla-login">
  <div class="login-card">
    <div class="login-logo">Dale pué 🛵</div>
    <div class="login-sub">Portal dueños / encargados</div>

    <label class="login-label">Correo electrónico</label>
    <input type="email" id="l-email" class="login-input" placeholder="tu@correo.com" autocomplete="email"/>

    <label class="login-label">Contraseña</label>
    <input type="password" id="l-pass" class="login-input" placeholder="••••••••"/>

    <button class="btn-login" id="btn-ingresar">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- PORTAL -->
<div id="pantalla-portal">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Dale pué 🛵</div>
      <div class="topbar-email" id="topbar-email">—</div>
    </div>
    <button class="btn-salir" id="btn-salir">Salir</button>
  </div>

  <div class="main">

    <!-- DATOS DEL LOCAL -->
    <div class="section">
      <div class="section-title">🏪 Datos del local</div>

      <div class="field">
        <label>Nombre del local</label>
        <input type="text" id="f-nombre" placeholder="Ej: El Oeste"/>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Dirección</label>
          <input type="text" id="f-direccion" placeholder="Ej: Leguizamón 1594"/>
        </div>
        <div class="field">
          <label>WhatsApp (con código de país)</label>
          <input type="tel" id="f-whatsapp" placeholder="5493874123456"/>
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Tipo de local</label>
          <select id="f-tipo">
            <option>Sandwichería</option>
            <option>Pizzería</option>
            <option>Parrilla</option>
            <option>Minutas</option>
            <option>Rotisería</option>
            <option>Heladería</option>
            <option>Café / Cafetería</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="field">
          <label>Estado</label>
          <select id="f-estado">
            <option value="abierto">Abierto ✅</option>
            <option value="cerrado">Cerrado ❌</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Horarios (se muestra en la app al cliente)</label>
        <textarea id="f-horarios" rows="3" placeholder="Ej: Lun a Jue y Dom: 12:00 a 04:00 AM&#10;Vie y Sab: 12:00 a 07:00 AM"></textarea>
        <small style="color:var(--muted); font-size:0.75rem; margin-top:4px; display:block;">Escribí cada línea por separado. Se muestra tal cual en la app.</small>
      </div>

      <button class="btn btn-primary" id="btn-guardar-local">Guardar datos del local</button>
    </div>

    <!-- MENÚ -->
    <div class="section">
      <div class="section-title">🍽️ Menú</div>

      <div class="tabs" id="tabs-categorias"></div>
      <div id="lista-productos"><p class="empty">Cargando...</p></div>

      <button class="btn btn-secondary" id="btn-mostrar-form" style="margin-top:1rem;">+ Agregar producto</button>

      <div class="form-producto" id="form-producto">
        <div class="form-producto-title">Nuevo producto</div>

        <div class="field">
          <label>Nombre</label>
          <input type="text" id="p-nombre" placeholder="Ej: Milanesa clásica"/>
        </div>
        <div class="field">
          <label>Descripción (opcional)</label>
          <textarea id="p-desc" placeholder="Ej: Con lechuga, tomate y papas"></textarea>
        </div>
        <div class="row-3">
          <div class="field">
            <label>Precio ($)</label>
            <input type="number" id="p-precio" placeholder="12000"/>
          </div>
          <div class="field">
            <label>Categoría</label>
            <input type="text" id="p-categoria" placeholder="Sandwiches"/>
          </div>
          <div class="field">
            <label>Tipo</label>
            <select id="p-tipo">
              <option value="comida">Comida 🍔</option>
              <option value="bebida">Bebida 🥤</option>
              <option value="alcohol">Alcohol 🍺</option>
            </select>
          </div>
        </div>
        <div class="row-2">
          <button class="btn btn-green" id="btn-confirmar-producto">Guardar producto</button>
          <button class="btn btn-secondary" id="btn-cancelar-producto">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- VISTA PREVIA -->
    <div class="section">
      <div class="section-title">👁️ Vista previa</div>
      <div id="preview-local"><p class="empty">Guardá los datos del local para ver la vista previa.</p></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE CONFIG ──
  const firebaseConfig = {
    apiKey:            "AIzaSyCwfVFtJxYIa6I1R624IRmF0SoE1o1-RPE",
    authDomain:        "dale-pue.firebaseapp.com",
    projectId:         "dale-pue",
    storageBucket:     "dale-pue.firebasestorage.app",
    messagingSenderId: "137759081638",
    appId:             "1:137759081638:web:0816dd9327837d4dc46067"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── ESTADO ──
  let localId       = null;
  let localData     = null;
  let catActiva     = null;

  // ── UTILIDADES ──
  function toast(msg, tipo = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${tipo} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function slugify(str) {
    return str.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, '')
      .replace(/[^a-z0-9]/g, '');
  }

  // ── LOGIN ──
  document.getElementById('btn-ingresar').addEventListener('click', async () => {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value.trim();
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('btn-ingresar');

    errEl.classList.remove('show');

    if (!email || !pass) {
      errEl.textContent = 'Completá email y contraseña.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch(e) {
      console.error('Error login:', e.code, e.message);
      const msgs = {
        'auth/user-not-found':    'No existe cuenta con ese correo.',
        'auth/wrong-password':    'Contraseña incorrecta.',
        'auth/invalid-email':     'Correo inválido.',
        'auth/invalid-credential':'Email o contraseña incorrectos.',
        'auth/too-many-requests': 'Demasiados intentos. Esperá un momento.',
        'auth/network-request-failed': 'Error de red. Revisá tu conexión.',
      };
      errEl.textContent = msgs[e.code] || `Error: ${e.code}`;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });

  document.getElementById('l-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-ingresar').click();
  });

  document.getElementById('btn-salir').addEventListener('click', () => auth.signOut());

  // ── OBSERVER ──
  auth.onAuthStateChanged(async user => {
    if (user) {
      document.getElementById('pantalla-login').style.display  = 'none';
      document.getElementById('pantalla-portal').style.display = 'block';
      document.getElementById('topbar-email').textContent = user.email;
      await cargarLocal(user.uid);
    } else {
      document.getElementById('pantalla-login').style.display  = 'flex';
      document.getElementById('pantalla-portal').style.display = 'none';
    }
  });

  // ── CARGAR LOCAL ──
  async function cargarLocal(uid) {
    try {
      const q = await db.collection('locales').where('dueno_uid', '==', uid).limit(1).get();
      if (!q.empty) {
        const snap = q.docs[0];
        localId   = snap.id;
        localData = snap.data();
        rellenarForm(localData);
        renderMenu(localData.menu || {});
        renderPreview(localData);
      } else {
        localData = { menu: {} };
        renderMenu({});
      }
    } catch(e) {
      console.error('Error cargarLocal:', e);
      toast('Error al cargar el local. Revisá tu conexión.', 'err');
    }
  }

  // ── FORMULARIO LOCAL ──
  function rellenarForm(d) {
    document.getElementById('f-nombre').value    = d.nombre    || '';
    document.getElementById('f-direccion').value = d.direccion || '';
    document.getElementById('f-whatsapp').value  = d.whatsapp  || '';
    document.getElementById('f-tipo').value      = d.tipo      || 'Sandwichería';
    document.getElementById('f-estado').value    = d.estado    || 'abierto';
    document.getElementById('f-horarios').value  = d.horariosTxt
      ? d.horariosTxt.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '')
      : '';
  }

  document.getElementById('btn-guardar-local').addEventListener('click', async () => {
    const btn    = document.getElementById('btn-guardar-local');
    const nombre = document.getElementById('f-nombre').value.trim();

    if (!nombre) { toast('El nombre del local es obligatorio.', 'err'); return; }

    const horariosRaw = document.getElementById('f-horarios').value.trim();
    const horariosTxt = horariosRaw
      ? horariosRaw.split('\n').map(l => `🕒 <b>${l.trim()}</b>`).join(' <br> ')
      : '';

    const datos = {
      nombre,
      direccion:   document.getElementById('f-direccion').value.trim(),
      whatsapp:    document.getElementById('f-whatsapp').value.trim(),
      tipo:        document.getElementById('f-tipo').value,
      estado:      document.getElementById('f-estado').value,
      horariosTxt,
      dueno_uid:   auth.currentUser.uid,
      menu:        localData?.menu || {}
    };

    btn.disabled    = true;
    btn.textContent = 'Guardando...';

    try {
      if (localId) {
        await db.collection('locales').doc(localId).update(datos);
      } else {
        localId = slugify(nombre);
        await db.collection('locales').doc(localId).set(datos);
      }
      localData = { ...datos };
      toast('✅ Local guardado.');
      renderPreview(localData);
    } catch(e) {
      console.error('Error guardar local:', e);
      toast('Error al guardar. Revisá tu conexión.', 'err');
    }

    btn.disabled    = false;
    btn.textContent = 'Guardar datos del local';
  });

  // ── MENÚ ──
  function renderMenu(menu) {
    const cats   = Object.keys(menu);
    const tabsCont = document.getElementById('tabs-categorias');
    const lista    = document.getElementById('lista-productos');

    tabsCont.innerHTML = '';

    if (cats.length === 0) {
      lista.innerHTML = '<p class="empty">No hay productos aún. Agregá el primero 👇</p>';
      return;
    }

    if (!catActiva || !menu[catActiva]) catActiva = cats[0];

    cats.forEach(cat => {
      const tab = document.createElement('button');
      tab.className = 'tab' + (cat === catActiva ? ' active' : '');
      tab.textContent = cat;
      tab.addEventListener('click', () => { catActiva = cat; renderMenu(localData.menu || {}); });
      tabsCont.appendChild(tab);
    });

    const productos = menu[catActiva] || [];
    lista.innerHTML = '';

    if (productos.length === 0) {
      lista.innerHTML = '<p class="empty">No hay productos en esta categoría.</p>';
      return;
    }

    productos.forEach((p, idx) => {
      const wrapper = document.createElement('div');

      // Tarjeta del producto
      const item = document.createElement('div');
      item.className = 'producto-item';
      item.innerHTML = `
        <div class="producto-info">
          <div class="producto-nombre">${p.nombre}</div>
          <div class="producto-meta">${p.desc || '—'} · ${p.tipo}</div>
        </div>
        <div class="producto-precio">$${p.precio}</div>
        <div style="display:flex; gap:0.3rem;">
          <button class="btn-editar" title="Editar">✏️</button>
          <button class="btn-eliminar" title="Eliminar">🗑️</button>
        </div>`;

      // Form de edición inline
      const formEd = document.createElement('div');
      formEd.className = 'form-edicion';
      formEd.innerHTML = `
        <div class="form-edicion-title">✏️ Editando: ${p.nombre}</div>
        <div class="field"><label>Nombre</label><input type="text" class="ed-nombre" value="${p.nombre}"/></div>
        <div class="field"><label>Descripción</label><textarea class="ed-desc">${p.desc || ''}</textarea></div>
        <div class="row-2">
          <div class="field"><label>Precio ($)</label><input type="number" class="ed-precio" value="${p.precio}"/></div>
          <div class="field"><label>Tipo</label>
            <select class="ed-tipo">
              <option value="comida" ${p.tipo==='comida'?'selected':''}>Comida 🍔</option>
              <option value="bebida" ${p.tipo==='bebida'?'selected':''}>Bebida 🥤</option>
              <option value="alcohol" ${p.tipo==='alcohol'?'selected':''}>Alcohol 🍺</option>
            </select>
          </div>
        </div>
        <div class="row-2">
          <button class="btn btn-green btn-guardar-edicion">Guardar cambios</button>
          <button class="btn btn-secondary btn-cancelar-edicion">Cancelar</button>
        </div>`;

      // Eventos
      item.querySelector('.btn-editar').addEventListener('click', () => {
        formEd.classList.toggle('visible');
      });

      item.querySelector('.btn-eliminar').addEventListener('click', () => eliminarProducto(catActiva, idx));

      formEd.querySelector('.btn-cancelar-edicion').addEventListener('click', () => {
        formEd.classList.remove('visible');
      });

      formEd.querySelector('.btn-guardar-edicion').addEventListener('click', async () => {
        const nuevoNombre = formEd.querySelector('.ed-nombre').value.trim();
        const nuevaDesc   = formEd.querySelector('.ed-desc').value.trim();
        const nuevoPrecio = parseInt(formEd.querySelector('.ed-precio').value);
        const nuevoTipo   = formEd.querySelector('.ed-tipo').value;

        if (!nuevoNombre || !nuevoPrecio) { toast('Nombre y precio son obligatorios.', 'err'); return; }

        localData.menu[catActiva][idx] = { nombre: nuevoNombre, desc: nuevaDesc, precio: nuevoPrecio, tipo: nuevoTipo };

        const btn = formEd.querySelector('.btn-guardar-edicion');
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        try {
          await db.collection('locales').doc(localId).update({ menu: localData.menu });
          renderMenu(localData.menu);
          toast('✅ Producto actualizado.');
        } catch(e) {
          toast('Error al guardar.', 'err');
          btn.disabled = false;
          btn.textContent = 'Guardar cambios';
        }
      });

      wrapper.appendChild(item);
      wrapper.appendChild(formEd);
      lista.appendChild(wrapper);
    });
  }

  // ── AGREGAR PRODUCTO ──
  document.getElementById('btn-mostrar-form').addEventListener('click', () => {
    const form = document.getElementById('form-producto');
    form.classList.toggle('visible');
    if (catActiva) document.getElementById('p-categoria').value = catActiva;
  });

  document.getElementById('btn-cancelar-producto').addEventListener('click', () => {
    document.getElementById('form-producto').classList.remove('visible');
    limpiarFormProducto();
  });

  document.getElementById('btn-confirmar-producto').addEventListener('click', async () => {
    if (!localId) { toast('Primero guardá los datos del local.', 'err'); return; }

    const nombre = document.getElementById('p-nombre').value.trim();
    const precio = parseInt(document.getElementById('p-precio').value);
    const cat    = document.getElementById('p-categoria').value.trim();

    if (!nombre || !precio || !cat) {
      toast('Nombre, precio y categoría son obligatorios.', 'err');
      return;
    }

    const producto = {
      nombre,
      desc:  document.getElementById('p-desc').value.trim(),
      precio,
      tipo:  document.getElementById('p-tipo').value
    };

    if (!localData.menu) localData.menu = {};
    if (!localData.menu[cat]) localData.menu[cat] = [];
    localData.menu[cat].push(producto);

    const btn = document.getElementById('btn-confirmar-producto');
    btn.disabled    = true;
    btn.textContent = 'Guardando...';

    try {
      await db.collection('locales').doc(localId).update({ menu: localData.menu });
      catActiva = cat;
      renderMenu(localData.menu);
      document.getElementById('form-producto').classList.remove('visible');
      limpiarFormProducto();
      toast('✅ Producto agregado.');
    } catch(e) {
      console.error('Error agregar producto:', e);
      toast('Error al guardar el producto.', 'err');
    }

    btn.disabled    = false;
    btn.textContent = 'Guardar producto';
  });

  function limpiarFormProducto() {
    ['p-nombre','p-desc','p-precio','p-categoria'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  // ── ELIMINAR PRODUCTO ──
  async function eliminarProducto(cat, idx) {
    if (!confirm('¿Eliminás este producto?')) return;

    localData.menu[cat].splice(idx, 1);
    if (localData.menu[cat].length === 0) {
      delete localData.menu[cat];
      catActiva = Object.keys(localData.menu)[0] || null;
    }

    try {
      await db.collection('locales').doc(localId).update({ menu: localData.menu });
      renderMenu(localData.menu);
      toast('Producto eliminado.');
    } catch(e) {
      toast('Error al eliminar.', 'err');
    }
  }

  // ── VISTA PREVIA ──
  function renderPreview(d) {
    const badge = d.estado === 'abierto'
      ? '<span class="badge badge-ok">Abierto</span>'
      : '<span class="badge badge-off">Cerrado</span>';

    const totalProductos = d.menu ? Object.values(d.menu).reduce((a, arr) => a + arr.length, 0) : 0;
    const totalCats      = d.menu ? Object.keys(d.menu).length : 0;

    document.getElementById('preview-local').innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.75rem;">
        <div>
          <div style="font-weight:700; font-size:1.1rem;">${d.nombre || '—'}</div>
          <div style="font-size:0.8rem; color:var(--muted); margin-top:2px;">${d.tipo || ''} • 📍 ${d.direccion || '—'}</div>
        </div>
        ${badge}
      </div>
      <div style="font-size:0.8rem; color:var(--muted);">
        WhatsApp: ${d.whatsapp || '—'} &nbsp;|&nbsp;
        ${totalProductos} productos en ${totalCats} categorías
      </div>`;
  }
</script>
</body>
</html>
