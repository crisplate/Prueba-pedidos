<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dale pué - Lo nuestro, al toque</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <!-- Leaflet y Firebase -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --rojo: #d9232d;
      --amarillo: #ffb800;
      --fondo: #f0f2f5;
    }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--fondo); margin: 0; padding: 15px; }
    
    /* VISTA PRINCIPAL */
    .header-plataforma { text-align: center; margin-bottom: 30px; }
    .header-plataforma h1 { color: var(--rojo); font-size: 2.5rem; margin: 0; }
    .header-plataforma p { color: #555; margin: 5px 0; }

    .tarjeta-local { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 6px solid var(--rojo); }
    .tarjeta-local h2 { margin: 0; color: #111; font-size: 1.5rem; }
    .btn-entrar { background: var(--rojo); color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; }

    /* VISTA MENÚ */
    .header-local { text-align: center; background: #111; color: var(--amarillo); padding: 20px; border-radius: 15px; margin-bottom: 20px; position: relative; }
    .btn-volver { position: absolute; top: 15px; left: 15px; background: #333; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer;}

    .container { max-width: 800px; margin: auto; }
    .categoria-titulo { border-bottom: 2px solid var(--amarillo); padding-bottom: 5px; color: #333; margin-top: 30px; }

    .card { background: white; margin-bottom: 15px; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--amarillo); }
    .info-producto { flex-grow: 1; padding-right: 10px; }
    .info-producto h3 { margin: 0; color: #111; font-size: 1.1rem; }
    .info-producto .desc { margin: 5px 0; color: #666; font-size: 0.8rem; line-height: 1.2; }
    .info-producto .precio { margin: 5px 0 0 0; color: #28a745; font-weight: bold; }
    .btn-agregar { background: #111; color: var(--amarillo); padding: 8px 12px; border-radius: 8px; font-weight: bold; border:none; cursor: pointer;}
    
    #carrito { margin-top: 30px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header-carrito { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn-vaciar { background: #dc3545; color: white; padding: 6px 12px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    
    .form-group { margin-top: 15px; display: flex; flex-direction: column; }
    .form-group label { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
    .form-group input, .form-group select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    
    .grid-botones-ubicacion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn-gps { background: #e0e0e0; padding: 10px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem;}
    .btn-gps.exito { background: #28a745; color: white; }
    .btn-mapa { background: #007bff; color: white; padding: 10px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem;}
    
    .btn-whatsapp { background: #25D366; width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem; color: white; border-radius: 10px; font-weight: bold; border:none; cursor: pointer;}
    .total { font-size: 1.3rem; font-weight: bold; text-align: right; margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }

    /* MODALES */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
    .grid-aderezos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .opcion-check { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 5px; background: #f9f9f9; border-radius: 5px; }
    .seccion-modal-titulo { border-left: 4px solid var(--amarillo); padding-left: 10px; margin: 15px 0 10px 0; background: #fff8e1; }
    #map { height: 300px; width: 100%; border-radius: 10px; margin-bottom: 15px; border: 2px solid #ccc;}
  </style>
</head>
<body>

  <div class="container">
    <div id="vista-locales">
      <div class="header-plataforma">
        <h1>Dale pué 🛵</h1>
        <p>Lo nuestro, al toque</p>
      </div>
      <div id="lista-locales">
        <p style="text-align:center;">Cargando locales...</p>
      </div>
    </div>

    <div id="vista-menu" style="display: none;">
      <div id="header-dinamico"></div>
      <div id="contenedor-categorias"></div>

      <div id="carrito">
        <div class="header-carrito">
          <h3 style="margin:0;">🛒 Tu Pedido</h3>
          <button class="btn-vaciar" id="btnVaciar" onclick="confirmarVaciarCarrito()" style="display: none;">🗑️ Vaciar Carrito</button>
        </div>
        <div id="listaCarrito"></div>
        <div class="total" id="totalCarrito">Total: $0</div>
        
        <div class="form-group"><label>Nombre y Apellido:</label><input type="text" id="nombreCliente" placeholder="Ej: Juan Pérez"></div>
        <div class="form-group"><label>Entrega:</label>
          <select id="tipoEntrega" onchange="toggleDireccion()"><option value="delivery">Envío a domicilio</option><option value="retiro">Retiro por el local</option></select>
        </div>
        <div id="seccionDireccion"><div class="form-group"><label>Dirección:</label><input type="text" id="direccionCliente" placeholder="Ej: Caseros 123">
          <div class="grid-botones-ubicacion"><button class="btn-gps" id="btnGPS" onclick="obtenerUbicacionGPS()">📍 Usar GPS</button><button class="btn-mapa" id="btnMapa" onclick="abrirModalMapa()">🗺️ Buscar en mapa</button></div>
        </div></div>
        <div class="form-group"><label>Pago:</label><select id="metodoPago"><option>Efectivo</option><option>Transferencia / Billetera Virtual</option></select></div>
        <button class="btn-whatsapp" onclick="enviarPedido()">Hacer pedido por WhatsApp</button>
      </div>
    </div>
  </div>

  <!-- MODAL EXTRAS -->
  <div id="modalExtras" class="modal-overlay">
    <div class="modal-content">
      <h3 id="modalTitulo" style="margin-top:0;">Personalizar</h3>
      <div class="seccion-modal-titulo"><h4>Aderezos</h4></div>
      <div class="grid-aderezos" id="contenedor-aderezos"></div>
      <div class="seccion-modal-titulo"><h4>Adicionales (Opcional)</h4></div>
      <div id="contenedor-adicionales">
        <div class="opcion-check"><label><input type="checkbox" class="extra-cb" value="1000" data-nombre="Jamón y Queso"> Jamón y Queso (+$1000)</label></div>
        <div class="opcion-check" style="margin-top:5px;"><label><input type="checkbox" class="extra-cb" value="3000" data-nombre="Baño Cheddar"> Baño de Cheddar (+$3000)</label></div>
      </div>
      <button class="btn-whatsapp" style="background:#28a745; margin-top:20px;" onclick="confirmarExtras()">Confirmar</button>
      <button class="btn-gps" style="background:#f1f1f1;" onclick="cerrarModalExtras()">Cancelar</button>
    </div>
  </div>

  <!-- MODAL MAPA -->
  <div id="modalMapaContenedor" class="modal-overlay">
    <div class="modal-content">
      <h3 style="margin-top:0;">Ubicá tu casa 🏠</h3>
      <div id="map"></div>
      <button class="btn-whatsapp" style="background:#28a745; margin-top:10px;" onclick="confirmarMapa()">✅ Confirmar ubicación</button>
      <button class="btn-gps" style="background:#f1f1f1; margin-top:10px;" onclick="cerrarModalMapa()">Cancelar</button>
    </div>
  </div>

  <script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCwfVFtJxYIa6I1R624IRmF0SoE1o1-RPE",
      authDomain: "dale-pue.firebaseapp.com",
      projectId: "dale-pue",
      storageBucket: "dale-pue.firebasestorage.app",
      messagingSenderId: "137759081638",
      appId: "1:137759081638:web:0816dd9327837d4dc46067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const aderezosLista = ["Ajo", "Ají", "Apio", "Morrón", "Kétchup", "Cheddar", "Mostaza", "Barbacoa", "Mayonesa", "Aceituna", "Roquefort", "Parmesano", "Salsa Golf", "Chimichurri"];
    
    let localesData = {};
    let localActual = null;
    let carrito = [];
    let productoTemporal = null;
    let linkGPS = "";
    let mapaInstance = null, marcador = null, coordsTemp = null;

    // CARGAR LOCALES DESDE FIREBASE
    async function cargarLocales() {
      const lista = document.getElementById('lista-locales');
      try {
        const querySnapshot = await db.collection('locales').get();
        lista.innerHTML = "";
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          localesData[doc.id] = data;
          
          const tarjeta = document.createElement('div');
          tarjeta.className = 'tarjeta-local';
          if(data.colorBrand) tarjeta.style.borderLeftColor = data.colorBrand;
          tarjeta.onclick = () => abrirLocal(doc.id);
          
          tarjeta.innerHTML = `
            <div>
              <h2>${data.nombre} ${data.estado === 'cerrado' ? '❌' : ''}</h2>
              <p>${data.descCorta || data.tipo} • 📍 ${data.direccion}</p>
            </div>
            <div class="btn-entrar" style="background:${data.colorBrand || '#d9232d'}">Ver menú</div>
          `;
          lista.appendChild(tarjeta);
        });
      } catch (e) {
        lista.innerHTML = "<p>Error al cargar. Pué, probá de nuevo.</p>";
      }
    }

    function abrirLocal(id) {
      localActual = localesData[id];
      document.getElementById('vista-locales').style.display = 'none';
      document.getElementById('vista-menu').style.display = 'block';
      
      const header = document.getElementById('header-dinamico');
      header.innerHTML = `
        <div class="header-local" style="border-bottom: 5px solid ${localActual.colorBrand || '#ffb800'}">
          <button class="btn-volver" onclick="volverInicio()">⬅ Volver</button>
          <h1>${localActual.nombre.toUpperCase()}</h1>
          <p>${localActual.descCorta || localActual.tipo} - ${localActual.direccion}</p>
        </div>
      `;
      renderizarMenu(localActual.menu);
      window.scrollTo(0,0);
    }

    function renderizarMenu(menu) {
      const cont = document.getElementById('contenedor-categorias');
      cont.innerHTML = "";
      
      for (const [catNombre, productos] of Object.entries(menu)) {
        const titulo = document.createElement('h2');
        titulo.className = 'categoria-titulo';
        titulo.innerText = catNombre + " 🍽️";
        cont.appendChild(titulo);

        productos.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div class="info-producto"><h3>${p.nombre}</h3><p class="desc">${p.desc || ''}</p><p class="precio">$${p.precio}</p></div>`;
          
          const btn = document.createElement('button');
          btn.className = 'btn-agregar';
          btn.innerText = "Agregar";
          btn.onclick = () => (p.tipo === 'comida') ? abrirModalExtras(p) : agregarDirecto(p);
          
          card.appendChild(btn);
          cont.appendChild(card);
        });
      }
    }

    function volverInicio() {
      document.getElementById('vista-menu').style.display = 'none';
      document.getElementById('vista-locales').style.display = 'block';
      carrito = []; actualizarCarrito();
    }

    // LÓGICA CARRITO Y EXTRAS (Mantenida del v0.8_67)
    function agregarDirecto(p) {
      carrito.push({ ...p, extras: [], aderezos: [], precioFinal: p.precio });
      actualizarCarrito();
    }

    function abrirModalExtras(p) {
      productoTemporal = p;
      document.getElementById("modalTitulo").innerText = p.nombre;
      const contAde = document.getElementById("contenedor-aderezos");
      contAde.innerHTML = "";
      aderezosLista.forEach(a => { 
        contAde.innerHTML += `<div class="opcion-check"><label><input type="checkbox" class="aderezo-cb" value="${a}"> ${a}</label></div>`; 
      });
      document.querySelectorAll(".extra-cb").forEach(cb => cb.checked = false);
      document.getElementById("modalExtras").style.display = "flex";
    }

    function cerrarModalExtras() { document.getElementById("modalExtras").style.display = "none"; }

    function confirmarExtras() {
      let pFinal = { ...productoTemporal, extras: [], aderezos: [] };
      let totalP = pFinal.precio;
      document.querySelectorAll(".aderezo-cb:checked").forEach(cb => pFinal.aderezos.push(cb.value));
      document.querySelectorAll(".extra-cb:checked").forEach(cb => {
        pFinal.extras.push({ n: cb.getAttribute("data-nombre"), p: parseInt(cb.value) });
        totalP += parseInt(cb.value);
      });
      pFinal.precioFinal = totalP;
      carrito.push(pFinal);
      cerrarModalExtras(); actualizarCarrito();
    }

    function actualizarCarrito() {
      const lista = document.getElementById("listaCarrito");
      lista.innerHTML = "";
      let total = 0;
      document.getElementById("btnVaciar").style.display = (carrito.length > 0) ? "block" : "none";
      
      carrito.forEach((item, i) => {
        let txt = "";
        if (item.aderezos?.length > 0) txt += `<small>Aderezos: ${item.aderezos.join(", ")}</small>`;
        if (item.extras?.length > 0) item.extras.forEach(e => txt += `<br><small style="color:red">+ ${e.n}</small>`);
        
        lista.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid #eee">
          <div style="display:flex; justify-content:space-between">
            <strong>${item.nombre}</strong>
            <span>$${item.precioFinal} <b onclick="carrito.splice(${i},1);actualizarCarrito()" style="color:red; cursor:pointer;">X</b></span>
          </div>${txt}
        </div>`;
        total += item.precioFinal;
      });
      document.getElementById("totalCarrito").innerText = "Total: $" + total;
    }

    function confirmarVaciarCarrito() { if(confirm("¿Vaciamos el pedido?")) { carrito = []; actualizarCarrito(); } }
    function toggleDireccion() { document.getElementById("seccionDireccion").style.display = (document.getElementById("tipoEntrega").value === "retiro") ? "none" : "block"; }

    // MAPA Y GPS
    function obtenerUbicacionGPS() {
      const btn = document.getElementById("btnGPS");
      btn.innerText = "⏳...";
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          linkGPS = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
          btn.innerText = "✅ GPS Listo"; btn.className = "btn-gps exito";
        }, () => { alert("No se pudo obtener ubicación."); btn.innerText = "📍 GPS"; });
      }
    }

    function abrirModalMapa() {
      document.getElementById("modalMapaContenedor").style.display = "flex";
      const latSalta = -24.7821, lngSalta = -65.4232;
      if (!mapaInstance) {
        mapaInstance = L.map('map').setView([latSalta, lngSalta], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapaInstance);
        marcador = L.marker([latSalta, lngSalta], { draggable: true }).addTo(mapaInstance);
        marcador.on('dragend', () => { coordsTemp = marcador.getLatLng(); });
      }
      setTimeout(() => { mapaInstance.invalidateSize(); }, 300);
    }

    function confirmarMapa() {
      if (coordsTemp) {
        linkGPS = `https://www.google.com/maps?q=${coordsTemp.lat},${coordsTemp.lng}`;
        document.getElementById("btnMapa").innerText = "✅ Mapa Listo";
        document.getElementById("btnMapa").className = "btn-mapa exito";
      }
      cerrarModalMapa();
    }
    function cerrarModalMapa() { document.getElementById("modalMapaContenedor").style.display = "none"; }

    // ENVÍO WHATSAPP (Formato Estricto)
    function enviarPedido() {
      const n = document.getElementById("nombreCliente").value.trim();
      if(!n || carrito.length === 0) { alert("Completá nombre y pedido."); return; }
      
      let m = `¡Hola *${localActual.nombre}*! 👋 Soy *${n}*. Pedido desde *Dale pué*:%0A%0A`;
      let t = 0;
      
      carrito.forEach(i => {
        let ico = i.tipo === "comida" ? "🍔" : (i.tipo === "alcohol" ? "🍺" : "🥤");
        m += `${ico} *${i.nombre}* ($${i.precioFinal})%0A`;
        if (i.aderezos?.length > 0) m += `   ⚠️ Aderezos: ${i.aderezos.join(", ")}%0A`;
        if (i.extras?.length > 0) m += `   ⚠️ Extras: ${i.extras.map(e=>e.n).join(", ")}%0A`;
        t += i.precioFinal;
      });
      
      m += `%0A💰 *TOTAL: $${t}*%0A💳 *Pago:* ${document.getElementById("metodoPago").value}%0A🛵 *Entrega:* ${document.getElementById("tipoEntrega").value}%0A`;
      if(document.getElementById("direccionCliente").value) m += `🏠 *Dirección:* ${document.getElementById("direccionCliente").value}%0A`;
      if(linkGPS) m += `📍 *Mapa:* ${linkGPS}`;
      
      window.open(`https://wa.me/${localActual.whatsapp}?text=${m}`, "_blank");
    }

    window.onload = cargarLocales;
  </script>
</body>
</html>
