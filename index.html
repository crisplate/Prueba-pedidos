<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pedidos Comunidad</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    #carrito {
      margin-top: 20px;
      padding: 15px;
      background: #fff3cd;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Pedidos Comunidad 🍔</h1>

    <div id="menu"></div>

    <div id="carrito">
      <h3>🛒 Carrito</h3>
      <ul id="listaCarrito"></ul>
    </div>
  </div>

  <script>
    const productos = [
      { nombre: "Hamburguesa", precio: 2500 },
      { nombre: "Pizza", precio: 4000 },
      { nombre: "Empanadas", precio: 1500 }
    ];

    const carrito = [];

    const menuDiv = document.getElementById("menu");
    const listaCarrito = document.getElementById("listaCarrito");

    function mostrarMenu() {
      productos.forEach((prod, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <h3>${prod.nombre}</h3>
          <p>$${prod.precio}</p>
          <button onclick="agregarAlCarrito(${index})">Agregar</button>
        `;
        menuDiv.appendChild(div);
      });
    }

    function agregarAlCarrito(index) {
      carrito.push(productos[index]);
      renderCarrito();
    }

    function renderCarrito() {
      listaCarrito.innerHTML = "";
      carrito.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.nombre + " - $" + item.precio;
        listaCarrito.appendChild(li);
      });
    }

    mostrarMenu();
  </script>

</body>
</html>
