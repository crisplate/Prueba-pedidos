<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dale pué - Lo nuestro, al toque 🛵</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
    .header-plataforma { text-align: center; margin-bottom: 30px; }
    .header-plataforma h1 { color: #d9232d; font-size: 2.5rem; margin: 0; }
    .header-plataforma p { color: #555; margin: 5px 0; font-weight: bold; }
    .tarjeta-local { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 6px solid #d9232d; }
    .tarjeta-local h2 { margin: 0; color: #111; font-size: 1.5rem; }
    .btn-entrar { background: #d9232d; color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
    .header-local { text-align: center; background: #111; color: #ffb800; padding: 20px; border-radius: 15px; margin-bottom: 20px; position: relative; }
    .btn-volver { position: absolute; top: 15px; left: 15px; background: #333; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer;}
    .container { max-width: 800px; margin: auto; }
    .categoria-titulo { border-bottom: 2px solid #ffb800; padding-bottom: 5px; color: #333; margin-top: 30px; }
    .card { background: white; margin-bottom: 15px; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ffb800; }
    .info-producto { flex-grow: 1; padding-right: 10px; }
    .info-producto h3 { margin: 0; color: #111; font-size: 1.1rem; }
    .info-producto .desc { margin: 5px 0; color: #666; font-size: 0.8rem; line-height: 1.2; }
    .info-producto .precio { margin: 5px 0 0 0; color: #28a745; font-weight: bold; }
    .btn-agregar { background: #111; color: #ffb800; padding: 8px 12px; border-radius: 8px; font-weight: bold; border:none; cursor: pointer;}
    #carrito { margin-top: 30px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header-carrito { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn-vaciar { background: #dc3545; color: white; padding: 6px 12px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    .form-group { margin-top: 15px; display: flex; flex-direction: column; }
    .form-group label { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
    .form-group input, .form-group select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    .grid-botones-ubicacion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn-gps { background: #e0e0e0; padding: 10px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem;}
    .btn-gps.exito { background: #28a745; color: white; }
    .btn-mapa { background: #007bff; color: white; padding: 10px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem;}
    .btn-whatsapp { background: #25D366; width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem; color: white; border-radius: 10px; font-weight: bold; border:none; cursor: pointer;}
    .total { font-size: 1.3rem; font-weight: bold; text-align: right; margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
    .grid-aderezos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .opcion-check { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 5px; background: #f9f9f9; border-radius: 5px; }
    .seccion-modal-titulo { border-left: 4px solid #ffb800; padding-left: 10px; margin: 15px 0 10px 0; background: #fff8e1; }
    #map { height: 300px; width: 100%; border-radius: 10px; margin-bottom: 15px; border: 2px solid #ccc;}
  </style>
</head>
<body>
  <div class="container">
    <div id="vista-locales">
      <div class="header-plataforma">
        <h1>Dale pué 🛵</h1>
        <p>Lo nuestro, al toque</p>
      </div>
      <div class="tarjeta-local" onclick="abrirLocal('eloeste')">
        <div>
          <h2>El Oeste</h2>
          <p>Sandwichería • Minutas • Bebidas</p>
          <p style="color: #888; font-size: 0.8rem;">📍 Leguizamón 1594</p>
        </div>
        <div class="btn-entrar">Ver menú</div>
      </div>
    </div>

    <div id="vista-menu" style="display: none;">
      <div class="header-local">
        <button class="btn-volver" onclick="volverInicio()">⬅ Volver</button>
        <h1 id="nombre-local-header">EL OESTE</h1>
        <p id="direccion-local-header">Leguizamón 1594</p>
      </div>
      <h2 class="categoria-titulo">Nuestras Variedades 🥪</h2>
      <div id="contenedor-productos"></div>
      <div id="carrito">
        <div class="header-carrito"><h3>🛒 Tu Pedido</h3><button class="btn-vaciar" id="btnVaciar" onclick="confirmarVaciarCarrito()" style="display: none;">🗑️</button></div>
        <div id="listaCarrito"></div>
        <div class="total" id="totalCarrito">Total: $0</div>
        <div class="form-group"><label>Tu Nombre:</label><input type="text" id="nombreCliente" placeholder="Ej: Cristian"></div>
        <div class="form-group"><label>Entrega:</label><select id="tipoEntrega" onchange="toggleDireccion()"><option value="delivery">Envío a domicilio</option><option value="retiro">Retiro por local</option></select></div>
        <div id="seccionDireccion"><div class="form-group"><label>Dirección:</label><input type="text" id="direccionCliente" placeholder="Ej: Av. Bicentenario 450"><div class="grid-botones-ubicacion"><button class="btn-gps" id="btnGPS" onclick="obtenerUbicacionGPS()">📍 GPS</button><button class="btn-mapa" id="btnMapa" onclick="abrirModalMapa()">🗺️ Mapa</button></div></div></div>
        <div class="form-group"><label>Pago:</label><select id="metodoPago"><option>Efectivo</option><option>Transferencia / Billetera Virtual</option></select></div>
        <button class="btn-whatsapp" onclick="enviarPedido()">Hacer pedido por WhatsApp</button>
      </div>
    </div>
  </div>

  <div id="modalExtras" class="modal-overlay">
    <div class="modal-content">
      <h3 id="modalTitulo" style="margin-top:0;">Personalizar</h3>
      <div class="seccion-modal-titulo"><h4>Aderezos</h4></div>
      <div class="grid-aderezos" id="contenedor-aderezos"></div>
      <div class="seccion-modal-titulo"><h4>Adicionales</h4></div>
      <div id="contenedor-adicionales">
        <div class="opcion-check"><label><input type="checkbox" class="extra-cb" value="1000" data-nombre="Jamón y Queso"> Jamón y Queso (+$1000)</label></div>
        <div class="opcion-check" style="margin-top:5px;"><label><input type="checkbox" class="extra-cb" value="3000" data-nombre="Baño Cheddar"> Baño de Cheddar (+$3000)</label></div>
      </div>
      <button class="btn-whatsapp" style="background:#28a745; margin-top:20px;" onclick="confirmarExtras()">Confirmar</button>
      <button class="btn-gps" style="background:#f1f1f1;" onclick="cerrarModalExtras()">Cancelar</button>
    </div>
  </div>

  <div id="modalMapaContenedor" class="modal-overlay">
    <div class="modal-content">
      <h3>Ubicá tu casa 🏠</h3>
      <div id="map"></div>
      <button class="btn-whatsapp" style="background:#28a745;" onclick="confirmarMapa()">✅ Confirmar ubicación</button>
      <button class="btn-gps" style="margin-top:10px;" onclick="cerrarModalMapa()">Cancelar</button>
    </div>
  </div>

  <script type="module">
    // --- AQUÍ CONECTAREMOS FIREBASE DESPUÉS ---
    const aderezosLista = ["Ajo", "Ají", "Apio", "Morrón", "Kétchup", "Cheddar", "Mostaza", "Barbacoa", "Mayonesa", "Aceituna", "Roquefort", "Salsa Golf"];
    let carrito = [];
    let productoTemporal = null;
    let linkGPS = "";
    let mapaInstance = null;
    let marcador = null;
    let coordsTemp = null;

    // Menú temporal (Esto se reemplazará por la carga de Firebase)
    const menuActual = [
        { nombre: "Milanesa clásica", desc: "120g carne, lechuga, tomate, huevo, cebolla + papas", precio: 12000, tipo: "comida" },
        { nombre: "Coca Cola 500ml", desc: "Sabor original", precio: 3000, tipo: "sinalcohol" }
    ];

    window.abrirLocal = function(id) {
      document.getElementById('vista-locales').style.display = 'none';
      document.getElementById('vista-menu').style.display = 'block';
      renderizarProductos();
      window.scrollTo(0,0);
    }

    window.volverInicio = function() {
      document.getElementById('vista-menu').style.display = 'none';
      document.getElementById('vista-locales').style.display = 'block';
    }

    function renderizarProductos() {
      const cont = document.getElementById("contenedor-productos");
      cont.innerHTML = "";
      menuActual.forEach(p => {
        const d = document.createElement("div");
        d.className = "card";
        d.innerHTML = `<div class="info-producto"><h3>${p.nombre}</h3><p class="desc">${p.desc}</p><p class="precio">$${p.precio}</p></div>`;
        const btn = document.createElement("button");
        btn.className = "btn-agregar";
        btn.innerText = "Agregar";
        btn.onclick = () => p.tipo === "comida" ? abrirModalExtras(p) : agregarDirecto(p);
        d.appendChild(btn);
        cont.appendChild(d);
      });
    }

    function agregarDirecto(p) {
      carrito.push({ ...p, extras: [], aderezos: [], precioFinal: p.precio });
      actualizarCarrito();
    }

    function abrirModalExtras(p) {
      productoTemporal = p;
      document.getElementById("modalTitulo").innerText = p.nombre;
      const cont = document.getElementById("contenedor-aderezos");
      cont.innerHTML = "";
      aderezosLista.forEach(a => { cont.innerHTML += `<div class="opcion-check"><label><input type="checkbox" class="aderezo-cb" value="${a}"> ${a}</label></div>`; });
      document.querySelectorAll(".extra-cb").forEach(cb => cb.checked = false);
      document.getElementById("modalExtras").style.display = "flex";
    }

    window.cerrarModalExtras = function() { document.getElementById("modalExtras").style.display = "none"; }

    window.confirmarExtras = function() {
      let pFinal = { ...productoTemporal, extras: [], aderezos: [] };
      let totalP = pFinal.precio;
      document.querySelectorAll(".aderezo-cb:checked").forEach(cb => pFinal.aderezos.push(cb.value));
      document.querySelectorAll(".extra-cb:checked").forEach(cb => {
        pFinal.extras.push({ n: cb.getAttribute("data-nombre"), p: parseInt(cb.value) });
        totalP += parseInt(cb.value);
      });
      pFinal.precioFinal = totalP;
      carrito.push(pFinal);
      cerrarModalExtras();
      actualizarCarrito();
    }

    function actualizarCarrito() {
      const lista = document.getElementById("listaCarrito");
      const btnV = document.getElementById("btnVaciar");
      lista.innerHTML = "";
      let total = 0;
      btnV.style.display = carrito.length > 0 ? "block" : "none";
      carrito.forEach((item, i) => {
        let txt = item.aderezos.length > 0 ? `<br><small>⚠️ ${item.aderezos.join(", ")}</small>` : "";
        item.extras.forEach(e => txt += `<br><small style="color:red">⚠️ + ${e.n}</small>`);
        lista.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid #eee"><div style="display:flex; justify-content:space-between"><strong>${item.nombre}</strong><span>$${item.precioFinal} <b onclick="quitarItem(${i})" style="color:red; cursor:pointer; margin-left:10px;">X</b></span></div>${txt}</div>`;
        total += item.precioFinal;
      });
      document.getElementById("totalCarrito").innerText = "Total: $" + total;
    }

    window.quitarItem = function(i) { carrito.splice(i, 1); actualizarCarrito(); }
    window.confirmarVaciarCarrito = function() { if(confirm("¿Vaciar pedido?")) { carrito = []; actualizarCarrito(); } }
    window.toggleDireccion = function() { document.getElementById("seccionDireccion").style.display = document.getElementById("tipoEntrega").value === "retiro" ? "none" : "block"; }

    window.obtenerUbicacionGPS = function() {
      const btn = document.getElementById("btnGPS");
      btn.innerText = "⏳...";
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          linkGPS = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
          btn.innerText = "✅ Listo";
          btn.className = "btn-gps exito";
        }, () => { alert("Error GPS"); btn.innerText = "📍 GPS"; });
      }
    }

    window.abrirModalMapa = function() {
      document.getElementById("modalMapaContenedor").style.display = "flex";
      if (!mapaInstance) {
        mapaInstance = L.map('map').setView([-24.7821, -65.4232], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapaInstance);
        marcador = L.marker([-24.7821, -65.4232], { draggable: true }).addTo(mapaInstance);
        mapaInstance.on('click', (e) => { marcador.setLatLng(e.latlng); coordsTemp = e.latlng; });
      }
      setTimeout(() => mapaInstance.invalidateSize(), 300);
    }

    window.cerrarModalMapa = function() { document.getElementById("modalMapaContenedor").style.display = "none"; }
    window.confirmarMapa = function() {
      let c = marcador.getLatLng();
      linkGPS = `https://www.google.com/maps?q=${c.lat},${c.lng}`;
      document.getElementById("btnMapa").className = "btn-mapa exito";
      cerrarModalMapa();
    }

    window.enviarPedido = function() {
      const n = document.getElementById("nombreCliente").value.trim();
      if(!n || carrito.length === 0) { alert("Completá tu nombre y el pedido."); return; }
      let m = `¡Hola *El Oeste*! 👋 Soy *${n}*. Pedido desde *Dale pué*:%0A%0A`;
      let t = 0;
      carrito.forEach(i => {
        let icon = i.tipo === "sinalcohol" ? "🥤" : (i.tipo === "alcohol" ? "🍺" : "🍔");
        m += `${icon} *${i.nombre}* ($${i.precioFinal})%0A`;
        if (i.aderezos.length > 0) m += `   ⚠️ Aderezos: ${i.aderezos.join(", ")}%0A`;
        if (i.extras.length > 0) m += `   ⚠️ Extras: ${i.extras.map(e => e.n).join(", ")}%0A`;
        t += i.precioFinal;
      });
      m += `%0A💰 *TOTAL: $${t}*%0A💳 *Pago:* ${document.getElementById("metodoPago").value}%0A🛵 *Entrega:* ${document.getElementById("tipoEntrega").value === "delivery" ? "Envío a domicilio" : "Retiro"}%0A`;
      if(linkGPS) m += `📍 *Ubicación:* ${linkGPS}`;
      window.open(`https://wa.me/5491124500967?text=${m}`, "_blank");
    }
  </script>
</body>
</html>
