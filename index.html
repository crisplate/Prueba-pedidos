<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dale pué - Pedidos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
    .header-plataforma { text-align: center; margin-bottom: 30px; }
    .header-plataforma h1 { color: #d9232d; font-size: 2.5rem; margin: 0; }
    .tarjeta-local { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 6px solid #d9232d; }
    .btn-entrar { background: #d9232d; color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
    .header-local { text-align: center; background: #111; color: #ffb800; padding: 20px; border-radius: 15px; margin-bottom: 20px; position: relative; }
    .btn-volver { position: absolute; top: 15px; left: 15px; background: #333; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .container { max-width: 800px; margin: auto; }
    .categoria-titulo { border-bottom: 2px solid #ffb800; padding-bottom: 5px; color: #333; margin-top: 30px; }
    .card { background: white; margin-bottom: 15px; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ffb800; }
    .info-producto h3 { margin: 0; font-size: 1.1rem; }
    .info-producto .desc { margin: 5px 0; color: #666; font-size: 0.8rem; }
    .info-producto .precio { margin: 5px 0 0 0; color: #28a745; font-weight: bold; }
    .btn-agregar { background: #111; color: #ffb800; padding: 8px 12px; border-radius: 8px; font-weight: bold; border:none; cursor: pointer; }
    #carrito { margin-top: 30px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .form-group { margin-top: 15px; display: flex; flex-direction: column; }
    .form-group label { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
    .form-group input, .form-group select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    .grid-botones-ubicacion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn-gps, .btn-mapa { padding: 10px; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; text-align: center; }
    .btn-gps { background: #e0e0e0; }
    .btn-mapa { background: #007bff; color: white; }
    .exito { background: #28a745 !important; color: white !important; }
    .btn-whatsapp { background: #25D366; width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem; color: white; border-radius: 10px; font-weight: bold; border:none; cursor: pointer; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
    .grid-aderezos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opcion-check { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 5px; background: #f9f9f9; border-radius: 5px; }
    #map { height: 300px; width: 100%; border-radius: 10px; border: 2px solid #ccc; }
  </style>
</head>
<body>

<div class="container">
  <div id="vista-locales">
    <div class="header-plataforma"><h1>Dale pué 🛵</h1><p>Salta Capital</p></div>
    <div class="tarjeta-local" onclick="abrirLocal('eloeste')">
      <div><h2>El Oeste</h2><p>Sandwichería • Minutas</p></div>
      <div class="btn-entrar">Ver menú</div>
    </div>
  </div>

  <div id="vista-menu" style="display:none;">
    <div class="header-local">
      <button class="btn-volver" onclick="volverInicio()">⬅ Volver</button>
      <h1>EL OESTE</h1><p>Leguizamón 1594</p>
    </div>
    <div id="categorias-menu">
      <h2 class="categoria-titulo">Sándwiches 🥪</h2><div id="menu-sandwiches"></div>
      <h2 class="categoria-titulo">Minutas 🍽️</h2><div id="menu-minutas"></div>
      <h2 class="categoria-titulo">Bebidas 🥤</h2><div id="menu-bebidas"></div>
    </div>
    <div id="carrito">
      <h3>🛒 Tu Pedido</h3>
      <div id="listaCarrito"></div>
      <h3 id="totalCarrito" style="text-align:right">Total: $0</h3>
      
      <div class="form-group"><label>Nombre y Apellido:</label><input type="text" id="nombreCliente"></div>
      
      <div class="form-group">
        <label>Forma de Pago:</label>
        <select id="metodoPago">
            <option value="Efectivo 💵">Efectivo 💵</option>
            <option value="Transferencia / Billetera Virtual 💳">Transferencia / Billetera Virtual 💳</option>
        </select>
      </div>

      <div class="form-group"><label>Entrega:</label><select id="tipoEntrega" onchange="toggleDireccion()"><option value="delivery">Delivery (Gratis)</option><option value="retiro">Retiro en Local</option></select></div>
      
      <div id="seccionDireccion">
        <div class="form-group"><label>Dirección:</label><input type="text" id="direccionCliente" placeholder="Ej: Caseros 123">
        <div class="grid-botones-ubicacion">
          <button class="btn-gps" id="btnGPS" onclick="obtenerGPS()">📍 GPS</button>
          <button class="btn-mapa" id="btnMapa" onclick="abrirModalMapa()">🗺️ Mapa</button>
        </div></div>
      </div>
      <button class="btn-whatsapp" onclick="enviarPedido()">Hacer pedido por WhatsApp</button>
    </div>
  </div>
</div>

<div id="modalExtras" class="modal-overlay">
  <div class="modal-content">
    <h3 id="modalTitulo">Personalizar</h3>
    <p><strong>Aderezos:</strong></p>
    <div class="grid-aderezos" id="cont-aderezos"></div>
    <p><strong>Adicionales:</strong></p>
    <div id="cont-extras">
      <div class="opcion-check"><label><input type="checkbox" class="extra-cb" value="1000" data-nombre="Jamón y Queso"> Jamón y Queso (+$1000)</label></div>
      <div class="opcion-check"><label><input type="checkbox" class="extra-cb" value="3000" data-nombre="Baño Cheddar"> Baño Cheddar (+$3000)</label></div>
      <div class="opcion-check"><label><input type="checkbox" class="extra-cb" value="3500" data-nombre="Bacon y Cheddar"> Bacon y Cheddar (+$3500)</label></div>
    </div>
    <button class="btn-whatsapp" style="background:#28a745" onclick="confirmarExtras()">Agregar al Carrito</button>
    <button class="btn-gps" style="width:100%; margin-top:10px" onclick="cerrarModalExtras()">Cancelar</button>
  </div>
</div>

<div id="modalMapa" class="modal-overlay">
  <div class="modal-content">
    <h3>Ubicá tu domicilio 🏠</h3>
    <div id="map"></div>
    <button class="btn-whatsapp" style="background:#28a745" onclick="confirmarMapa()">✅ Confirmar Ubicación</button>
    <button class="btn-gps" style="width:100%; margin-top:10px" onclick="cerrarModalMapa()">Cerrar</button>
  </div>
</div>

<script>
  const aderezos = ["Ajo", "Ají", "Apio", "Morrón", "Kétchup", "Cheddar", "Mostaza", "Barbacoa", "Mayonesa", "Aceituna", "Roquefort", "Parmesano", "Salsa Golf", "Chimichurri"];
  const menu = {
    sandwiches: [
      { n: "Milanesa clásica", d: "120g carne + papas", p: 12000 },
      { n: "Milanesa gigante p/2", d: "200g carne + papas", p: 17000 },
      { n: "Milanesa súper tucumana", d: "3 milas + papas", p: 18000 },
      { n: "Gigante tucumana", d: "2 milas 200g + papas", p: 22000 },
      { n: "Lomo XL", d: "450g carne + papas", p: 25000 }
    ],
    minutas: [
      { n: "Milanesa a caballo", d: "Con huevos fritos", p: 12500 },
      { n: "Milanesa napolitana", d: "Jamón y queso", p: 12500 },
      { n: "Lomo a la frontera", d: "Especialidad", p: 11500 }
    ],
    bebidas: [
      { n: "Coca 500ml", d: "", p: 3000 },
      { n: "Gaseosa 1.5L", d: "Línea Coca", p: 7000 },
      { n: "Cerveza 710ml", d: "Rubia/Negra", p: 5000 }
    ]
  };

  let carrito = []; let prodTemp = null; let linkGPS = ""; let mapa, marcador;

  function abrirLocal(id) { document.getElementById('vista-locales').style.display='none'; document.getElementById('vista-menu').style.display='block'; renderMenu(); }
  function volverInicio() { document.getElementById('vista-menu').style.display='none'; document.getElementById('vista-locales').style.display='block'; }

  function renderMenu() {
    const r = (arr, id, extras) => {
      const c = document.getElementById(id); c.innerHTML = "";
      arr.forEach(p => {
        const div = document.createElement("div"); div.className="card";
        const pS = JSON.stringify(p).replace(/"/g, '&quot;');
        div.innerHTML = `<div class="info-producto"><h3>${p.n}</h3><p class="desc">${p.d}</p><p class="precio">$${p.p}</p></div>
        <button class="btn-agregar" onclick="clickProd('${pS}', ${extras})">Agregar</button>`;
        c.appendChild(div);
      });
    };
    r(menu.sandwiches, "menu-sandwiches", true); r(menu.minutas, "menu-minutas", true); r(menu.bebidas, "menu-bebidas", false);
  }

  function clickProd(pS, extras) {
    const p = JSON.parse(pS.replace(/&quot;/g, '"'));
    if(extras) { prodTemp = p; abrirModalExtras(); } 
    else { carrito.push({...p, ad:[], ex:[], pf:p.p}); actualizarCarrito(); }
  }

  function abrirModalExtras() {
    document.getElementById("modalExtras").style.display="flex";
    const c = document.getElementById("cont-aderezos"); c.innerHTML = "";
    aderezos.forEach(a => c.innerHTML += `<div class="opcion-check"><label><input type="checkbox" class="ad-cb" value="${a}"> ${a}</label></div>`);
    document.querySelectorAll(".extra-cb").forEach(x => x.checked = false);
  }

  function cerrarModalExtras() { document.getElementById("modalExtras").style.display="none"; }

  function confirmarExtras() {
    let pf = prodTemp.p; let ads = []; let exs = [];
    document.querySelectorAll(".ad-cb:checked").forEach(cb => ads.push(cb.value));
    document.querySelectorAll(".extra-cb:checked").forEach(cb => { exs.push(cb.getAttribute("data-nombre")); pf += parseInt(cb.value); });
    carrito.push({...prodTemp, ad:ads, ex:exs, pf:pf});
    cerrarModalExtras(); actualizarCarrito();
  }

  function actualizarCarrito() {
    const l = document.getElementById("listaCarrito"); l.innerHTML = ""; let t = 0;
    carrito.forEach((item, i) => {
      l.innerHTML += `<div style="border-bottom:1px solid #eee; padding:5px 0">
        <b>${item.n}</b> ($${item.pf}) <span onclick="carrito.splice(${i},1);actualizarCarrito()" style="color:red; cursor:pointer"> (Borrar)</span><br>
        <small>${item.ad.length ? '🧂 ' + item.ad.join(", ") : ''} ${item.ex.length?' ➕ '+item.ex.join(', '):''}</small>
      </div>`;
      t += item.pf;
    });
    document.getElementById("totalCarrito").innerText = "Total: $" + t;
  }

  function toggleDireccion() { document.getElementById("seccionDireccion").style.display = document.getElementById("tipoEntrega").value==="retiro"?"none":"block"; }

  function obtenerGPS() {
    navigator.geolocation.getCurrentPosition(p => {
      linkGPS = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
      document.getElementById("btnGPS").classList.add("exito");
      document.getElementById("btnGPS").innerText = "✅ GPS Listo";
    });
  }

  function abrirModalMapa() {
    document.getElementById("modalMapa").style.display="flex";
    if(!mapa) {
      mapa = L.map('map').setView([-24.7821, -65.4232], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
      marcador = L.marker([-24.7821, -65.4232], {draggable:true}).addTo(mapa);
    }
    setTimeout(() => mapa.invalidateSize(), 200);
  }

  function confirmarMapa() {
    const c = marcador.getLatLng();
    linkGPS = `https://www.google.com/maps?q=${c.lat},${c.lng}`;
    document.getElementById("btnMapa").classList.add("exito");
    document.getElementById("btnMapa").innerText = "✅ Mapa Listo";
    document.getElementById("modalMapa").style.display="none";
  }

  function enviarPedido() {
    const nom = document.getElementById("nombreCliente").value;
    const pago = document.getElementById("metodoPago").value;
    const entrega = document.getElementById("tipoEntrega").value;
    const dir = document.getElementById("direccionCliente").value;
    
    if(!nom || !carrito.length) return alert("Por favor, poné tu nombre y agregá algo al carrito.");
    
    let m = `¡Hola *El Oeste*! 👋 Soy *${nom}*. Pedido desde *Dale pué*:%0A%0A`;
    carrito.forEach(i => {
      m += `🍔 *${i.n}* ($${i.pf})%0A`;
      if(i.ad.length) m += `   🧂 _${i.ad.join(', ')}_%0A`;
      if(i.ex.length) m += `   ➕ _${i.ex.join(', ')}_%0A`;
    });
    
    m += `%0A💰 *TOTAL: ${document.getElementById("totalCarrito").innerText}*%0A💳 *Pago:* ${pago}%0A🛵 *Entrega:* ${entrega === 'delivery' ? 'Envío a domicilio' : 'Retiro en local'}`;
    
    if(entrega === 'delivery') {
        if(dir) m += `%0A🏠 *Dirección:* ${dir}`;
        if(linkGPS) m += `%0A📍 *Mapa:* ${linkGPS}`;
    }
    
    window.open(`https://wa.me/5491124500967?text=${m}`);
  }
</script>
</body>
</html>
