<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pedidos Comunidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Estilo para el botón de WhatsApp */
    .btn-enviar {
      background: #25D366; 
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      font-size: 16px;
    }

    #carrito {
      margin-top: 20px;
      padding: 15px;
      background: #fff3cd;
      border-radius: 10px;
    }

    .total-container {
      font-size: 18px;
      font-weight: bold;
      text-align: right;
      margin-top: 10px;
      border-top: 2px solid #ccc;
      padding-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Pedidos Comunidad 🍔🛵</h1>

    <div id="menu"></div>

    <div id="carrito">
      <h3>🛒 Mi Carrito</h3>
      <ul id="listaCarrito"></ul>
      <div class="total-container" id="totalCarrito">Total: $0</div>
      <button class="btn-enviar" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
    </div>
  </div>

  <script>
    const productos = [
      { nombre: "Hamburguesa", precio: 2500 },
      { nombre: "Pizza", precio: 4000 },
      { nombre: "Empanadas", precio: 1500 }
    ];

    const carrito = [];

    const menuDiv = document.getElementById("menu");
    const listaCarrito = document.getElementById("listaCarrito");
    const totalDiv = document.getElementById("totalCarrito");

    function mostrarMenu() {
      productos.forEach((prod, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div>
            <h3 style="margin: 0;">${prod.nombre}</h3>
            <p style="margin: 5px 0 0 0;">$${prod.precio}</p>
          </div>
          <button onclick="agregarAlCarrito(${index})">Agregar</button>
        `;
        menuDiv.appendChild(div);
      });
    }

    function agregarAlCarrito(index) {
      carrito.push(productos[index]);
      renderCarrito();
    }

    function renderCarrito() {
      listaCarrito.innerHTML = "";
      let total = 0;

      carrito.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.nombre + " - $" + item.precio;
        listaCarrito.appendChild(li);
        total += item.precio;
      });

      totalDiv.textContent = "Total: $" + total;
    }

    function enviarPedido() {
      if(carrito.length === 0) {
        alert("¡El carrito está vacío! Agregá algo antes de pedir.");
        return;
      }

      // 1. Armamos el texto del mensaje que te va a llegar
      let mensaje = "Hola! Quiero hacer el siguiente pedido:%0A";
      let total = 0;

      carrito.forEach(item => {
        mensaje += `- ${item.nombre} ($${item.precio})%0A`;
        total += item.precio;
      });

      mensaje += `%0A*Total: $${total}*%0A`;
      mensaje += "Gracias!";

      // 2. ACA PONÉ TU NÚMERO DE TELÉFONO
      // Formato: 54 + 9 + código de área + número. Sin espacios ni signos.
      const numeroWhatsApp = "5491124500967"; 
      
      // 3. Abrimos WhatsApp con el mensaje armado
      const url = `https://wa.me/${numeroWhatsApp}?text=${mensaje}`;
      window.open(url, "_blank");
    }

    mostrarMenu();
  </script>

</body>
</html>
