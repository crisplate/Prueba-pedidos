<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dale pué - El Oeste Sandwichería</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #f0f2f5; 
      margin: 0; 
      padding: 15px; 
    }
    
    .header-local {
      text-align: center;
      background: #111;
      color: #ffb800;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    
    .header-local h1 { margin: 0; font-size: 2rem; }
    .header-local p { margin: 5px 0 0 0; color: #fff; }

    .container { max-width: 800px; margin: auto; }
    
    .categoria-titulo {
      border-bottom: 2px solid #ffb800;
      padding-bottom: 5px;
      color: #333;
      margin-top: 30px;
    }

    .card {
      background: white;
      margin-bottom: 15px;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid #ffb800;
    }

    .info-producto { flex-grow: 1; padding-right: 15px; }
    .info-producto h3 { margin: 0; color: #111; font-size: 1.2rem; }
    .info-producto .desc { margin: 5px 0; color: #666; font-size: 0.85rem; line-height: 1.3; }
    .info-producto .precio { margin: 5px 0 0 0; color: #28a745; font-weight: bold; font-size: 1.1rem; }

    button { 
      background: #111; 
      color: #ffb800; 
      border: none; 
      padding: 10px 15px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: bold; 
      white-space: nowrap;
    }
    button:hover { background: #333; }
    
    #carrito { 
      margin-top: 30px; 
      padding: 20px; 
      background: white; 
      border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    }
    .btn-whatsapp { 
      background: #25D366; 
      width: 100%; 
      margin-top: 15px; 
      padding: 15px; 
      font-size: 1.1rem; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      font-weight: bold; 
      cursor: pointer; 
    }
    .total { 
      font-size: 1.3rem; 
      font-weight: bold; 
      text-align: right; 
      margin-top: 15px; 
      border-top: 2px solid #eee; 
      padding-top: 10px; 
    }
    
    .item-carrito {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed #ccc;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-local">
      <h1>EL OESTE</h1>
      <p>Sandwichería - Leguizamón 1594</p>
      <p style="font-size: 0.8rem; color: #aaa;">Pedí por <strong>Dale pué</strong></p>
    </div>

    <h2 class="categoria-titulo">Tu Sándwich Favorito 🥪</h2>
    <div id="menu-sandwiches"></div>

    <h2 class="categoria-titulo">Nuestras Minutas 🍽️</h2>
    <div id="menu-minutas"></div>

    <h2 class="categoria-titulo">Bebidas 🥤</h2>
    <div id="menu-bebidas"></div>

    <div id="carrito">
      <h3 style="margin-top:0;">🛒 Tu Pedido</h3>
      <div id="listaCarrito"></div>
      <div class="total" id="totalCarrito">Total: $0</div>
      <button class="btn-whatsapp" onclick="enviarPedido()">Hacer pedido por WhatsApp</button>
    </div>
  </div>

  <script>
    // Base de datos transcribiendo el menú de las imágenes
    const menuElOeste = {
      sandwiches: [
        { nombre: "Milanesa clásica", desc: "1 milanesa de 120g de carne, lechuga, tomate, huevo y cebolla + 300g de papas fritas", precio: 12000 },
        { nombre: "Milanesa gigante p/2", desc: "1 milanesa de 200g de carne, lechuga, tomate, huevo y cebolla + 500g de papas fritas", precio: 17000 },
        { nombre: "Milanesa súper tucumana", desc: "3 milanesas de 120g c/u, lechuga, tomate y cebolla + 300g de papas fritas", precio: 18000 },
        { nombre: "Lomo clásico", desc: "1 porción de carne de 200g, lechuga, tomate y huevo + 300g de papas fritas", precio: 12000 },
        { nombre: "Lomo XL", desc: "1 porción de carne de 450g, lechuga, tomate y huevo + 600g de papas fritas", precio: 25000 }
      ],
      minutas: [
        { nombre: "Milanesa al plato", desc: "Clásica al plato", precio: 11500 },
        { nombre: "Milanesa napolitana", desc: "Con salsa, jamón y queso", precio: 12500 },
        { nombre: "Lomo a la frontera", desc: "Especialidad de la casa", precio: 11500 },
        { nombre: "Napolitana para compartir", desc: "Porción grande", precio: 20000 }
      ],
      bebidas: [
        { nombre: "Coca Cola 500 ml", desc: "Línea Coca o Zero", precio: 3000 },
        { nombre: "Gaseosa 1.5 L", desc: "Coca, Zero, Sprite o Fanta", precio: 7000 },
        { nombre: "Cerveza 710 ml", desc: "Rubia o negra", precio: 5000 }
      ]
    };

    const carrito = [];

    function renderizarCategoria(arrayProductos, contenedorId) {
      const contenedor = document.getElementById(contenedorId);
      arrayProductos.forEach((prod) => {
        const div = document.createElement("div");
        div.className = "card";
        
        // Convertimos el objeto a un string seguro para pasarlo a la función
        const productoJSON = JSON.stringify(prod).replace(/"/g, '&quot;');

        div.innerHTML = `
          <div class="info-producto">
            <h3>${prod.nombre}</h3>
            <p class="desc">${prod.desc}</p>
            <p class="precio">$${prod.precio}</p>
          </div>
          <button onclick="agregarAlCarrito(${productoJSON})">Agregar</button>
        `;
        contenedor.appendChild(div);
      });
    }

    function agregarAlCarrito(producto) {
      carrito.push(producto);
      actualizarCarrito();
    }

    function actualizarCarrito() {
      const lista = document.getElementById("listaCarrito");
      const divTotal = document.getElementById("totalCarrito");
      
      lista.innerHTML = "";
      let total = 0;

      if(carrito.length === 0) {
        lista.innerHTML = "<p style='color:#888; text-align:center;'>Tu carrito está vacío</p>";
      } else {
        carrito.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = "item-carrito";
          div.innerHTML = `
            <span>${item.nombre}</span>
            <span>$${item.precio} <strong style="color:red; cursor:pointer; margin-left:10px;" onclick="eliminarDelCarrito(${index})">X</strong></span>
          `;
          lista.appendChild(div);
          total += item.precio;
        });
      }

      divTotal.textContent = "Total: $" + total;
    }

    function eliminarDelCarrito(index) {
      carrito.splice(index, 1);
      actualizarCarrito();
    }

    function enviarPedido() {
      if(carrito.length === 0) {
        alert("¡No agregaste nada al pedido todavía!");
        return;
      }

      let mensaje = "¡Hola *El Oeste Sandwichería*! 👋%0AQuiero hacer un pedido a través de *Dale pué*:%0A%0A";
      let total = 0;
      
      carrito.forEach(item => {
        mensaje += `▪️ ${item.nombre} ($${item.precio})%0A`;
        total += item.precio;
      });

      mensaje += `%0A💰 *TOTAL: $${total}*%0A%0A`;
      mensaje += "Por favor, confirmame el pedido y pasame los datos para transferir.";

      // Número sacado del flyer
      const numeroWhatsApp = "5491124500967"; 
      
      window.open(`https://wa.me/${numeroWhatsApp}?text=${mensaje}`, "_blank");
    }

    // Inicializamos la página
    renderizarCategoria(menuElOeste.sandwiches, "menu-sandwiches");
    renderizarCategoria(menuElOeste.minutas, "menu-minutas");
    renderizarCategoria(menuElOeste.bebidas, "menu-bebidas");
    actualizarCarrito();

  </script>
</body>
</html>
